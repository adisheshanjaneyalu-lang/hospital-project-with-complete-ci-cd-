apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 283904064984.dkr.ecr.eu-north-1.amazonaws.com/shivam-hospital-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: backend
spec:
  selector:
    app: frontend
  ports:
  - port: 8000
    targetPort: 80
